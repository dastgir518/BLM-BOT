  <style>/* ============================================================
   Bio-Lec Mobility — Dastgir Chatbot
   Fresh look inspired by biolecmobility.com.
   ============================================================ */

:root {
  /* Brand — mobility site uses a brighter green-blue with sharper teal accents */
  --blm-green: #1FA85A;       /* primary CTA green */
  --blm-green-deep: #14703D;  /* hover / headers */
  --blm-green-soft: #E6F4EC;  /* tinted bg */
  --blm-teal: #0E7C7B;        /* secondary accent */
  --blm-blue: #2D6EAB;        /* link / NHS accent */

  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --surface-2: #F4F2EC;
  --ink: #14201A;
  --ink-2: #4A5650;
  --ink-3: #7B847F;
  --line: #E4E1D7;
  --line-soft: #EFEDE6;

  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-pill: 999px;

  --shadow-1: 0 1px 2px rgba(20, 32, 26, 0.04), 0 8px 24px rgba(20, 112, 61, 0.06);
  --shadow-2: 0 2px 6px rgba(20, 32, 26, 0.06), 0 16px 36px rgba(20, 112, 61, 0.10);
  --shadow-3: 0 8px 24px rgba(20, 32, 26, 0.10), 0 32px 64px rgba(20, 112, 61, 0.18);
  --shadow-bubble: 0 12px 32px rgba(20, 112, 61, 0.28), 0 4px 8px rgba(0,0,0,0.08);

  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);

  --serif: "Source Serif 4", "Source Serif Pro", Georgia, serif;
  --sans: "IBM Plex Sans", -apple-system, "Segoe UI", system-ui, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--sans);
  color: var(--ink);
  background: var(--bg);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

* { box-sizing: border-box; }

button { font-family: inherit; cursor: pointer; }
a { color: var(--blm-green-deep); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ============================================================
   FAUX BIOLECMOBILITY.COM PAGE (background)
   ============================================================ */

.page {
  min-height: 100vh;
  background: var(--bg);
}

.page-banner {
  background: linear-gradient(135deg, #14703D, #1FA85A);
  color: #FFF;
  text-align: center;
  font-size: 13px;
  padding: 10px 20px;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.page-header {
  background: #FFF;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 5;
}
.page-header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 32px;
}
.page-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  color: var(--blm-green-deep);
  letter-spacing: -0.01em;
}
.page-logo-mark {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--blm-green);
  color: #FFF;
  display: grid; place-items: center;
  font-weight: 700;
  font-family: var(--sans);
}
.page-nav {
  display: flex; gap: 24px; flex: 1;
  font-size: 14px; font-weight: 500;
  color: var(--ink-2);
}
.page-nav a { color: inherit; }
.page-nav a:hover { color: var(--blm-green-deep); }
.page-header-actions {
  display: flex; gap: 12px; align-items: center;
}
.page-header-search {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  font-size: 13px;
  color: var(--ink-3);
  width: 240px;
}
.page-cart-btn {
  border: none; background: var(--blm-green);
  color: #FFF;
  padding: 8px 16px;
  border-radius: var(--r-pill);
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}

.page-hero {
  max-width: 1280px;
  margin: 48px auto;
  padding: 0 24px;
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 48px;
  align-items: center;
}
.page-hero-eyebrow {
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--blm-green-deep);
  margin-bottom: 16px;
}
.page-hero h1 {
  font-family: var(--serif);
  font-size: 56px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin: 0 0 20px;
  color: var(--ink);
  font-weight: 500;
}
.page-hero p {
  font-size: 18px;
  color: var(--ink-2);
  margin: 0 0 28px;
  max-width: 460px;
}
.page-hero-tiles {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.page-hero-tile {
  aspect-ratio: 1;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  position: relative;
  overflow: hidden;
}
.page-hero-tile-glyph {
  font-size: 80px;
  line-height: 1;
  filter: saturate(0.9);
}
.page-hero-tile-cta {
  font-size: 12px;
  color: var(--blm-green-deep);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.page-strip {
  background: var(--blm-green-soft);
  padding: 32px 24px;
  margin-top: 48px;
}
.page-strip-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
  text-align: center;
  font-size: 14px;
  color: var(--blm-green-deep);
  font-weight: 600;
}
.page-strip-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.page-section {
  max-width: 1280px;
  margin: 64px auto 0;
  padding: 0 24px;
}
.page-section h2 {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 500;
  margin: 0 0 24px;
}
.page-products {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.page-product {
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: var(--surface);
  overflow: hidden;
}
.page-product-img {
  aspect-ratio: 1;
  display: grid; place-items: center;
  font-size: 80px;
}
.page-product-meta {
  padding: 16px;
  font-size: 13px;
}
.page-product-name {
  font-weight: 600; color: var(--ink);
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.page-product-price {
  color: var(--blm-green-deep);
  font-weight: 700;
  font-size: 15px;
  margin-top: 8px;
}

.page-footer {
  margin-top: 96px;
  background: var(--ink);
  color: rgba(255,255,255,0.7);
  padding: 48px 24px 32px;
}
.page-footer-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 40px;
  font-size: 13px;
}
.page-footer h4 {
  color: #FFF;
  font-size: 14px;
  margin: 0 0 12px;
}
.page-footer ul { padding: 0; list-style: none; margin: 0; line-height: 2; }

/* ============================================================
   FLOATING CHAT BUBBLE
   ============================================================ */

.chat-bubble {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
}
.chat-bubble-tooltip {
  background: #FFF;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 14px 18px 14px 16px;
  font-size: 13px;
  line-height: 1.4;
  box-shadow: var(--shadow-2);
  max-width: 280px;
  position: relative;
  animation: tt-fade 400ms var(--ease);
}
.chat-bubble-tooltip-name {
  font-weight: 600;
  color: var(--blm-green-deep);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.chat-bubble-tooltip-close {
  position: absolute; top: 6px; right: 6px;
  background: none; border: none; font-size: 14px;
  color: var(--ink-3);
  width: 22px; height: 22px;
  border-radius: 50%;
}
.chat-bubble-tooltip-close:hover { background: var(--surface-2); }
@keyframes tt-fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.chat-bubble-btn {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1FA85A, #14703D);
  color: #FFF;
  border: none;
  box-shadow: var(--shadow-bubble);
  display: grid; place-items: center;
  position: relative;
  transition: transform 200ms var(--ease), box-shadow 200ms var(--ease);
}
.chat-bubble-btn:hover { transform: scale(1.05); box-shadow: 0 16px 40px rgba(20, 112, 61, 0.4); }
.chat-bubble-btn:active { transform: scale(0.96); }
.chat-bubble-btn svg { width: 28px; height: 28px; }
.chat-bubble-pulse {
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 2px solid var(--blm-green);
  animation: pulse 2s var(--ease) infinite;
  pointer-events: none;
}
@keyframes pulse {
  0% { opacity: 0.6; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.3); }
}
.chat-bubble-badge {
  position: absolute;
  top: -4px; right: -4px;
  width: 22px; height: 22px;
  background: #E64545;
  color: #FFF;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
  border: 2px solid #FFF;
}

/* ============================================================
   OVERLAY (chat open)
   ============================================================ */

.overlay {
  position: fixed; inset: 0;
  z-index: 100;
  pointer-events: none;
  /* No backdrop — chatbot lives next to the page, doesn't take it over */
}
/* Pointer events back on for the actual app */
.overlay > * { pointer-events: auto; }
@keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }

.app {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 440px;
  height: min(720px, calc(100vh - 48px));
  background: var(--bg);
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-3);
  display: grid;
  grid-template-columns: 1fr;
  overflow: hidden;
  border: 1px solid var(--line);
  animation: app-in 280ms var(--ease);
}
@keyframes app-in {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to { opacity: 1; transform: none; }
}

/* ---------------- CANVAS (left) ---------------- */

.canvas {
  background:
    radial-gradient(ellipse at top, rgba(31, 168, 90, 0.04), transparent 60%),
    var(--bg);
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

.canvas-head {
  padding: 16px 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px);
  flex-shrink: 0;
}
.canvas-head-brand {
  display: flex; align-items: center; gap: 10px;
}
.canvas-head-mark {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--blm-green);
  color: #FFF;
  display: grid; place-items: center;
  font-family: var(--sans); font-weight: 700; font-size: 14px;
}
.canvas-head-name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  color: var(--ink);
}
.canvas-head-status {
  font-size: 11px;
  color: var(--blm-green-deep);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.status-dot {
  width: 7px; height: 7px;
  background: var(--blm-green);
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(31, 168, 90, 0.18);
  animation: dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(31, 168, 90, 0.18); }
  50% { box-shadow: 0 0 0 6px rgba(31, 168, 90, 0.06); }
}
.canvas-head-spacer { flex: 1; }
.canvas-head-action {
  background: none; border: 1px solid var(--line);
  border-radius: var(--r-pill);
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  display: flex; align-items: center; gap: 6px;
}
.canvas-head-action:hover { background: var(--surface); border-color: var(--ink-3); }
.canvas-head-close {
  width: 32px; height: 32px;
  border: none; background: var(--surface-2);
  border-radius: 50%;
  display: grid; place-items: center;
  color: var(--ink-2);
}
.canvas-head-close:hover { background: var(--ink); color: #FFF; }

.canvas-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px 100px;
  scroll-behavior: smooth;
}

.canvas-empty {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--ink-3);
  font-size: 14px;
  flex-direction: column;
  gap: 16px;
  padding: 40px;
}

.canvas-stack { display: flex; flex-direction: column; gap: 24px; max-width: 760px; margin: 0 auto; }

/* ---------------- WIDGET FRAME ---------------- */

.w-frame {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
  overflow: hidden;
  animation: w-in 400ms var(--ease);
}
@keyframes w-in {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: none; }
}
.w-frame-head {
  padding: 20px 24px 0;
}
.w-frame-body { padding: 16px 24px 20px; }
.w-frame-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--line-soft);
  background: var(--surface-2);
}
.w-eyebrow {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--blm-green-deep);
}
.w-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  margin: 4px 0 0;
  letter-spacing: -0.01em;
}
.w-lede {
  font-size: 14px;
  color: var(--ink-2);
  margin: 0 0 16px;
  line-height: 1.55;
}
.w-foot-row {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
.w-foot-note {
  font-size: 12px;
  color: var(--ink-3);
}
.row-gap { display: flex; gap: 8px; }

/* ---------------- BUTTONS / PILLS ---------------- */

.btn {
  border: none;
  border-radius: var(--r-pill);
  font-family: var(--sans);
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 160ms var(--ease);
}
.btn-primary {
  background: var(--blm-green);
  color: #FFF;
  padding: 12px 22px;
  font-size: 14px;
}
.btn-primary:hover { background: var(--blm-green-deep); }
.btn-primary:disabled { background: var(--line); color: var(--ink-3); cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--ink-2);
  padding: 12px 18px;
  font-size: 14px;
  border: 1px solid var(--line);
}
.btn-ghost:hover { background: var(--surface-2); color: var(--ink); border-color: var(--ink-3); }
.btn-sm { padding: 8px 14px; font-size: 13px; }

.icon-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--line);
  background: #FFF;
  display: grid; place-items: center;
  color: var(--ink-2);
}
.icon-btn:hover { color: var(--blm-green-deep); border-color: var(--blm-green); }
.icon-btn.is-on { background: var(--blm-green-soft); color: var(--blm-green-deep); border-color: var(--blm-green); }

.pill {
  display: inline-flex; align-items: center;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  background: var(--surface-2);
  color: var(--ink-2);
}
.pill-leaf { background: var(--blm-green-soft); color: var(--blm-green-deep); }

.link-quiet {
  font-size: 12px;
  color: var(--ink-3);
  text-decoration: underline;
  text-decoration-color: var(--line);
}
.link-quiet:hover { color: var(--blm-green-deep); }

/* ---------------- WELCOME / PROMPTS ---------------- */

.prompt-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 8px;
}
.prompt-chip {
  background: var(--surface-2);
  border: 1px solid var(--line-soft);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  transition: all 160ms var(--ease);
}
.prompt-chip:hover {
  background: #FFF;
  border-color: var(--blm-green);
  transform: translateY(-1px);
  box-shadow: var(--shadow-1);
}
.prompt-icon { font-size: 20px; flex-shrink: 0; }
.prompt-label { flex: 1; }
.prompt-arrow { color: var(--ink-3); flex-shrink: 0; transition: color 160ms var(--ease); }
.prompt-chip:hover .prompt-arrow { color: var(--blm-green-deep); }

/* ---------------- CLARIFY CHIPS ---------------- */

.chip-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.opt-chip {
  background: #FFF;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 160ms var(--ease);
}
.opt-chip:hover { border-color: var(--blm-green); background: var(--blm-green-soft); }
.opt-chip.is-on {
  background: var(--blm-green);
  color: #FFF;
  border-color: var(--blm-green);
}
.opt-icon { font-size: 16px; }
.opt-sub { font-size: 11px; color: var(--ink-3); margin-left: 4px; }
.inline-foot { padding: 16px 0 0; border: none; background: none; }

/* ---------------- PRODUCT CARDS ---------------- */

.product-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.product-card {
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  background: #FFF;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform 200ms var(--ease), box-shadow 200ms var(--ease);
}
.product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }

.product-image {
  aspect-ratio: 4 / 3;
  display: grid; place-items: center;
  position: relative;
  font-size: 64px;
}
.product-image-glyph {
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.08));
}
.product-flag {
  position: absolute; top: 10px; left: 10px;
  background: #E64545;
  color: #FFF;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 4px 8px;
  border-radius: var(--r-sm);
}
.product-flag.flag-best {
  background: var(--blm-green-deep);
  left: auto; right: 10px;
}
.product-meta {
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
  flex: 1;
}
.product-cat {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  font-weight: 600;
}
.product-name {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  margin: 0;
  line-height: 1.3;
}
.product-rating {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px;
  color: var(--ink-3);
}
.product-rating-num { font-weight: 500; }
.stars { display: inline-flex; gap: 1px; }

.product-bullets {
  padding-left: 16px;
  margin: 4px 0;
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.5;
}
.product-bullets li { margin-bottom: 2px; }

.product-foot {
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--line-soft);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 8px;
}
.money { display: flex; flex-direction: column; gap: 2px; }
.money-was {
  font-size: 11px;
  color: var(--ink-3);
  text-decoration: line-through;
}
.money-now {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  font-family: var(--serif);
}
.money-vat {
  font-size: 10px;
  color: var(--blm-green-deep);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.product-actions { display: flex; gap: 6px; align-items: center; }

/* ---------------- SPEC CARD ---------------- */

.spec-hero {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
.spec-image {
  aspect-ratio: 1;
  border-radius: var(--r-md);
  display: grid; place-items: center;
  font-size: 72px;
}
.spec-summary {
  display: flex; flex-direction: column; gap: 10px;
  align-self: center;
}
.spec-tags { display: flex; flex-wrap: wrap; gap: 6px; }

.spec-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 16px;
}
.spec-table tr { border-bottom: 1px solid var(--line-soft); }
.spec-table tr:last-child { border-bottom: none; }
.spec-table th {
  text-align: left;
  font-weight: 500;
  color: var(--ink-3);
  padding: 10px 0;
  width: 38%;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.spec-table td {
  padding: 10px 0;
  color: var(--ink);
  font-weight: 500;
}

/* ---------------- COMPARE ---------------- */

.cmp-grid {
  display: grid;
  font-size: 13px;
  margin: 8px 0 16px;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  overflow: hidden;
}
.cmp-head {
  padding: 14px 12px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  text-align: center;
}
.cmp-head:not(:last-child) { border-right: 1px solid var(--line); }
.cmp-image {
  width: 80px; aspect-ratio: 1;
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  font-size: 36px;
}
.cmp-name {
  font-weight: 600;
  font-size: 12px;
  line-height: 1.3;
}
.cmp-row-label {
  padding: 12px;
  background: var(--surface-2);
  font-weight: 500;
  color: var(--ink-2);
  font-size: 12px;
  border-top: 1px solid var(--line-soft);
}
.cmp-row-val {
  padding: 12px;
  border-top: 1px solid var(--line-soft);
  font-weight: 500;
  position: relative;
  text-align: center;
}
.cmp-row-val.is-best {
  background: var(--blm-green-soft);
  color: var(--blm-green-deep);
  font-weight: 600;
}
.best-flag {
  position: absolute;
  top: 4px; right: 4px;
  font-size: 9px;
  background: var(--blm-green);
  color: #FFF;
  padding: 1px 6px;
  border-radius: var(--r-pill);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ---------------- ORDER ---------------- */

.order-summary {
  background: var(--surface-2);
  border-radius: var(--r-md);
  padding: 16px;
  margin-bottom: 24px;
  display: grid;
  gap: 8px;
}
.order-row { display: flex; gap: 12px; font-size: 13px; }
.order-k {
  flex: 0 0 96px;
  color: var(--ink-3);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.order-v { color: var(--ink); }

.track-rail {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  position: relative;
  margin-bottom: 24px;
  padding: 0 12px;
}
.track-rail::before {
  content: '';
  position: absolute;
  top: 8px; left: 12px; right: 12px;
  height: 2px;
  background: var(--line);
  z-index: 0;
}
.track-step {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  position: relative;
  z-index: 1;
}
.track-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #FFF;
  border: 2px solid var(--line);
  position: relative;
  z-index: 2;
}
.track-step.done .track-dot {
  background: var(--blm-green);
  border-color: var(--blm-green);
}
.track-step.now .track-dot {
  background: var(--blm-green);
  border-color: var(--blm-green);
  box-shadow: 0 0 0 6px rgba(31, 168, 90, 0.20);
  animation: dot-pulse 2s ease-in-out infinite;
}
.track-label {
  font-size: 11px;
  color: var(--ink-3);
  text-align: center;
  font-weight: 500;
}
.track-step.done .track-label, .track-step.now .track-label {
  color: var(--ink);
  font-weight: 600;
}

.order-items {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 16px;
}
.order-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px;
  border: 1px solid var(--line-soft);
  border-radius: var(--r-md);
}
.order-item-thumb {
  width: 48px; height: 48px;
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  font-size: 22px;
  flex-shrink: 0;
}
.order-item-info { flex: 1; }
.order-item-name { font-size: 13px; font-weight: 600; }
.order-item-meta { font-size: 12px; color: var(--ink-3); }

/* ---------------- VAT FORM ---------------- */

.vat-saving {
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(135deg, var(--blm-green-soft), #FFF);
  border: 1px dashed var(--blm-green);
  border-radius: var(--r-md);
  padding: 16px 20px;
  margin-bottom: 16px;
}
.vat-saving-k {
  font-size: 12px;
  color: var(--blm-green-deep);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.vat-saving-v {
  font-family: var(--serif);
  font-size: 30px;
  color: var(--blm-green-deep);
  font-weight: 600;
  margin-top: 2px;
}

.form-grid {
  display: grid;
  gap: 16px;
  margin-bottom: 16px;
}
.field { display: flex; flex-direction: column; gap: 4px; }
.field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.field-input {
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 11px 14px;
  font-size: 14px;
  font-family: var(--sans);
  background: #FFF;
  transition: border 160ms var(--ease), box-shadow 160ms var(--ease);
}
.field-input:focus {
  outline: none;
  border-color: var(--blm-green);
  box-shadow: 0 0 0 3px rgba(31, 168, 90, 0.16);
}
.field-hint {
  font-size: 12px;
  color: var(--ink-3);
}
.field-check {
  flex-direction: row;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.5;
  background: var(--surface-2);
  padding: 12px 14px;
  border-radius: var(--r-sm);
}
.field-check input[type=checkbox] {
  width: 18px; height: 18px;
  margin-top: 2px;
  accent-color: var(--blm-green);
}

/* ---------------- INVOICE ---------------- */

.inv-head {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-bottom: 20px;
  font-size: 12px;
}
.inv-k {
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  font-weight: 600;
  font-size: 11px;
  margin-bottom: 4px;
}
.inv-v { color: var(--ink); line-height: 1.5; }
.inv-mute { color: var(--ink-3); }

.inv-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 16px;
}
.inv-table th {
  text-align: left;
  padding: 10px;
  background: var(--surface-2);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  font-weight: 600;
}
.inv-table th:nth-child(2),
.inv-table th:nth-child(3),
.inv-table th:nth-child(4),
.inv-table td:nth-child(2),
.inv-table td:nth-child(3),
.inv-table td:nth-child(4) {
  text-align: right;
}
.inv-table td {
  padding: 12px 10px;
  border-bottom: 1px solid var(--line-soft);
  vertical-align: top;
}
.inv-item-name { font-weight: 600; color: var(--ink); }
.inv-item-sku { font-size: 11px; color: var(--ink-3); margin-top: 2px; font-family: var(--mono); }

.inv-totals {
  margin-left: auto;
  width: 50%;
  font-size: 13px;
  display: flex; flex-direction: column; gap: 6px;
}
.inv-tot-row {
  display: flex; justify-content: space-between;
  padding: 4px 0;
}
.inv-tot-grand {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  border-top: 1px solid var(--ink);
  padding-top: 10px;
  margin-top: 6px;
}
.vat-saved {
  margin-top: 10px;
  text-align: right;
  font-size: 12px;
  color: var(--blm-green-deep);
  font-weight: 600;
}

/* ---------------- CALL BOOKING ---------------- */

.call-host {
  display: flex; align-items: center; gap: 12px;
  padding: 14px;
  background: var(--surface-2);
  border-radius: var(--r-md);
  margin-bottom: 16px;
}
.call-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1FA85A, #14703D);
  color: #FFF;
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 18px;
  font-family: var(--serif);
}
.call-host-name { font-weight: 600; font-size: 14px; }
.call-host-meta { font-size: 12px; color: var(--ink-3); }

.slots {
  display: flex; flex-direction: column; gap: 12px;
  margin-bottom: 16px;
}
.slot-day { display: flex; gap: 12px; align-items: center; }
.slot-day-label {
  flex: 0 0 140px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
}
.slot-times { display: flex; gap: 6px; flex-wrap: wrap; }
.time-chip {
  background: #FFF;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  transition: all 160ms var(--ease);
}
.time-chip:hover { border-color: var(--blm-green); }
.time-chip.is-on {
  background: var(--blm-green);
  color: #FFF;
  border-color: var(--blm-green);
}

/* ---------------- BULK QUOTE ---------------- */

.bulk-table {
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  margin-bottom: 16px;
  overflow: hidden;
}
.bulk-row {
  display: grid;
  grid-template-columns: 1fr 120px 80px 100px;
  align-items: center;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 13px;
  gap: 10px;
}
.bulk-row:last-child { border-bottom: none; }
.bulk-row.bulk-head {
  background: var(--surface-2);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  font-weight: 600;
}
.bulk-name { font-weight: 600; }
.qty-stepper {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  padding: 2px;
  background: #FFF;
}
.qty-stepper button {
  width: 24px; height: 24px;
  border: none; background: var(--surface-2);
  border-radius: 50%;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  display: grid; place-items: center;
}
.qty-stepper button:hover { background: var(--blm-green); color: #FFF; }
.qty-stepper span { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 24px; text-align: center; }

.bulk-totals {
  margin-left: auto;
  width: 60%;
  font-size: 13px;
  display: flex; flex-direction: column; gap: 6px;
}
.bulk-tot-row {
  display: flex; justify-content: space-between;
  padding: 4px 0;
}
.bulk-tot-disc { color: var(--blm-green-deep); font-weight: 600; }
.bulk-tot-grand {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  border-top: 1px solid var(--ink);
  padding-top: 10px;
  margin-top: 6px;
}

/* ---------------- CART ADDED ---------------- */

.cart-row {
  display: flex; align-items: center; gap: 14px;
}
.cart-thumb {
  width: 64px; height: 64px;
  border-radius: var(--r-sm);
  display: grid; place-items: center;
  font-size: 30px;
  flex-shrink: 0;
}
.cart-info { flex: 1; }
.cart-meta { font-size: 12px; color: var(--ink-3); }
.cart-summary { text-align: right; }
.cart-summary-k {
  font-size: 11px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.cart-summary-v {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
}

/* ============================================================
   CHAT THREAD (right column)
   ============================================================ */

.thread {
  background: var(--surface);
  display: flex;
  flex-direction: column;
  min-height: 0;
  min-width: 0;
  width: 100%;
  max-width: 100%;
  overflow: hidden;
}

.thread-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.thread-head-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
}
.thread-head-sub {
  font-size: 12px;
  color: var(--ink-3);
}
.thread-actions { margin-left: auto; display: flex; gap: 6px; }

.thread-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px 18px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg { display: flex; gap: 8px; max-width: 100%; }
.msg-user { justify-content: flex-end; }
.msg-agent { justify-content: flex-start; }

.msg-bubble {
  max-width: 84%;
  padding: 10px 14px;
  border-radius: var(--r-md);
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
  animation: m-in 280ms var(--ease);
}
@keyframes m-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: none; }
}
.msg-user .msg-bubble {
  background: var(--blm-green);
  color: #FFF;
  border-radius: 16px 16px 4px 16px;
  word-break: break-word;
  overflow-wrap: anywhere;
}
.msg-agent .msg-bubble {
  background: var(--surface-2);
  color: var(--ink);
  border-radius: 16px 16px 16px 4px;
}
.msg-widget {
  width: 100%;
  max-width: 100%;
  min-width: 0;
}
.msg-widget-inner {
  width: 100%;
  max-width: 100%;
  min-width: 0;
  animation: m-in 320ms var(--ease);
}
.msg-widget-inner > * {
  max-width: 100% !important;
  width: 100% !important;
  box-sizing: border-box;
}

/* Inline widget overrides — collapse multi-col layouts so they fit in 440px chat column */
.msg-widget .product-grid { grid-template-columns: 1fr !important; }
.msg-widget .cmp-grid { font-size: 11px; }
.msg-widget .spec-hero { grid-template-columns: 1fr !important; }
.msg-widget .inv-head { grid-template-columns: 1fr !important; }
.msg-widget .inv-totals { width: 100% !important; }
.msg-widget .bulk-totals { width: 100% !important; }
.msg-widget .bulk-table { font-size: 12px; }
.msg-widget .bulk-row { grid-template-columns: 1fr 70px 60px !important; padding: 10px 12px !important; gap: 6px !important; font-size: 12px !important; }
.msg-widget .bulk-row > :nth-child(3) { display: none !important; }
.msg-widget .bulk-row.bulk-head > :nth-child(3) { display: none !important; }
.msg-widget .qty-stepper { padding: 1px !important; }
.msg-widget .qty-stepper button { width: 20px !important; height: 20px !important; }
.msg-widget .cmp-grid { grid-template-columns: 110px 1fr 1fr !important; font-size: 11px !important; }
.msg-widget .cmp-head { padding: 10px 6px !important; }
.msg-widget .cmp-image { width: 48px !important; font-size: 22px !important; }
.msg-widget .cmp-name { font-size: 11px !important; }
.msg-widget .cmp-row-label, .msg-widget .cmp-row-val { padding: 8px 6px !important; font-size: 11px !important; }
.msg-widget .product-card { min-width: 0; }
.msg-widget .product-card img, .msg-widget .product-card .prod-img { max-width: 100%; }

/* Compact horizontal product cards inline */
.msg-widget .product-card {
  flex-direction: row !important;
  align-items: stretch;
}
.msg-widget .product-image {
  width: 90px !important;
  flex-shrink: 0;
  aspect-ratio: 1 !important;
  font-size: 36px !important;
}
.msg-widget .product-meta {
  padding: 10px 12px !important;
  gap: 4px !important;
  min-width: 0;
}
.msg-widget .product-cat { font-size: 9px !important; }
.msg-widget .product-name { font-size: 13px !important; line-height: 1.25 !important; }
.msg-widget .product-rating { font-size: 10px !important; }
.msg-widget .product-bullets { display: none !important; }
.msg-widget .product-foot { padding-top: 6px !important; border-top: none !important; }
.msg-widget .money-now { font-size: 14px !important; }
.msg-widget .money-was { font-size: 10px !important; }
.msg-widget .money-vat { font-size: 9px !important; }
.msg-widget .product-actions .btn,
.msg-widget .product-actions button { font-size: 11px !important; padding: 5px 10px !important; }
.msg-widget .product-flag { font-size: 9px !important; padding: 2px 6px !important; top: 6px !important; left: 6px !important; }
.msg-widget .product-flag.flag-best { left: auto !important; right: 6px !important; }
.msg-widget .product-grid { gap: 8px !important; }
.msg-widget .prompt-grid { grid-template-columns: 1fr !important; }
.msg-widget .clarify-options { grid-template-columns: 1fr !important; }
.msg-widget table { font-size: 12px; }
.msg-widget img { max-width: 100%; height: auto; }
.msg-widget * { min-width: 0; }

.msg, .msg-bubble { min-width: 0; }
.thread-scroll { min-width: 0; }

.msg-time {
  font-size: 10px;
  color: var(--ink-3);
  text-align: center;
  padding: 4px 0;
}

.typing-bubble {
  display: inline-flex;
  gap: 4px;
  padding: 12px 16px;
  background: var(--surface-2);
  border-radius: 16px 16px 16px 4px;
}
.typing-dot {
  width: 6px; height: 6px;
  background: var(--ink-3);
  border-radius: 50%;
  animation: typing 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.15s; }
.typing-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typing {
  0%, 100% { opacity: 0.3; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-3px); }
}

.composer {
  border-top: 1px solid var(--line);
  padding: 12px 16px 16px;
  background: var(--surface);
  flex-shrink: 0;
}
.composer-inner {
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  background: #FFF;
  padding: 8px 8px 8px 14px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  transition: border 160ms var(--ease), box-shadow 160ms var(--ease);
}
.composer-inner:focus-within {
  border-color: var(--blm-green);
  box-shadow: 0 0 0 3px rgba(31, 168, 90, 0.12);
}
.composer textarea,
.landing-composer textarea {
  flex: 1;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  background: transparent;
  padding: 6px 0;
  max-height: 120px;
  color: var(--ink);
}
.composer textarea::placeholder,
.landing-composer textarea::placeholder { color: var(--ink-3); }
.composer-send {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--blm-green);
  color: #FFF;
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: all 160ms var(--ease);
}
.composer-send:hover { background: var(--blm-green-deep); }
.composer-send:disabled { background: var(--line); cursor: not-allowed; }

.composer-tools {
  display: flex; gap: 4px; align-items: center;
  flex-shrink: 0;
}
.composer-tool-btn {
  width: 32px; height: 32px;
  border: none;
  background: transparent;
  border-radius: 50%;
  color: var(--ink-3);
  display: grid; place-items: center;
}
.composer-tool-btn:hover { background: var(--surface-2); color: var(--blm-green-deep); }

.composer-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px;
  padding: 0 4px;
  font-size: 11px;
  color: var(--ink-3);
}

.quick-actions {
  display: flex; gap: 6px; padding: 0 16px 8px;
  overflow-x: auto;
  flex-shrink: 0;
}
.quick-action {
  flex-shrink: 0;
  background: var(--surface-2);
  border: 1px solid transparent;
  border-radius: var(--r-pill);
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  white-space: nowrap;
}
.quick-action:hover {
  background: #FFF; border-color: var(--blm-green); color: var(--blm-green-deep);
}

/* ============================================================
   MOBILE
   ============================================================ */

@media (max-width: 880px) {
  .page-hero { grid-template-columns: 1fr; }
  .page-hero h1 { font-size: 36px; }
  .page-strip-inner { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .page-products { grid-template-columns: repeat(2, 1fr); }
  .page-footer-inner { grid-template-columns: 1fr 1fr; }
  .page-nav { display: none; }

  .overlay { padding: 0; }
  .app {
    inset: 0;
    bottom: 0;
    right: 0;
    width: 100vw;
    height: 100vh;
    max-height: 100vh;
    max-width: 100vw;
    border-radius: 0;
    grid-template-columns: 1fr;
  }
  .thread { height: 100vh; }
  .product-grid { grid-template-columns: 1fr; }
  .spec-hero { grid-template-columns: 1fr; }
  .inv-head { grid-template-columns: 1fr; }
  .inv-totals { width: 100%; }
  .bulk-totals { width: 100%; }
  .cmp-grid { font-size: 11px; }
  .prompt-grid { grid-template-columns: 1fr; }
  .slot-day { flex-direction: column; align-items: flex-start; }
  .slot-day-label { flex: none; }

  .mobile-tabbar {
    display: flex !important;
  }
}

.mobile-tabbar {
  display: none !important;
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #FFF;
  border-radius: var(--r-pill);
  padding: 4px;
  z-index: 110;
  box-shadow: var(--shadow-3);
}
.mobile-tabbar button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.6);
  padding: 8px 18px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--sans);
}
.mobile-tabbar button.is-on {
  background: var(--blm-green);
  color: #FFF;
}

/* Tweaks panel — let starter component handle layout, just tweak feel */
[data-tweaks-panel] {
  font-family: var(--sans) !important;
}

/* ============================================================
   LANDING SCREEN (initial state — full-page centered)
   ============================================================ */

.app-landing {
  grid-template-columns: 1fr !important;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(31, 168, 90, 0.12), transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(14, 124, 123, 0.08), transparent 60%),
    var(--bg);
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 420px;
  height: min(640px, calc(100vh - 48px));
  max-width: calc(100vw - 48px);
}

.landing-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 36px;
  height: 36px;
  border: none;
  background: var(--surface-2);
  border-radius: 50%;
  color: var(--ink-2);
  display: grid;
  place-items: center;
  z-index: 2;
  transition: all 160ms var(--ease);
}
.landing-close:hover { background: var(--ink); color: #FFF; }

.landing {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-y: auto;
  padding: 24px 20px;
}

.landing-inner {
  width: 100%;
  max-width: 380px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.landing-mark-wrap {
  position: relative;
  width: 56px;
  height: 56px;
  margin-bottom: 14px;
  animation: l-pop 600ms var(--ease);
}
.landing-mark {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--blm-green), var(--blm-green-deep));
  color: #FFF;
  display: grid;
  place-items: center;
  font-family: var(--serif);
  font-weight: 600;
  font-size: 26px;
  box-shadow: 0 8px 20px rgba(20, 112, 61, 0.32);
  position: relative;
  z-index: 2;
}
.landing-pulse {
  position: absolute;
  inset: -8px;
  border-radius: 22px;
  border: 2px solid var(--blm-green);
  animation: pulse 2.4s var(--ease) infinite;
  pointer-events: none;
  opacity: 0.4;
}

.landing-eyebrow {
  font-size: 11px;
  padding: 4px 10px;
  margin-bottom: 14px;
}

.landing-title {
  font-size: 28px;
  line-height: 1.15;
  margin: 0 0 10px;
  padding: 0;
  text-wrap: balance;
}

.landing-sub {
  font-size: 13px;
  line-height: 1.5;
  max-width: 100%;
  margin: 0 0 20px;
}

.landing-prompts {
  display: grid;
  grid-template-columns: 1fr;
  gap: 6px;
  width: 100%;
  margin-bottom: 16px;
}

.landing-prompt {
  padding: 11px 14px;
  gap: 10px;
  font-size: 13px;
  border-radius: var(--r-md);
}
.landing-prompt-icon {
  font-size: 16px;
  width: 30px;
  height: 30px;
}

.landing-composer { width: 100%; }
.landing-composer .composer-inner {
  padding: 8px 8px 8px 14px;
  border-radius: var(--r-lg);
}
.landing-composer textarea {
  font-size: 14px;
  padding: 8px 0;
}
.landing-composer .composer-send { width: 36px; height: 36px; }

.landing-foot {
  margin-top: 8px;
  font-size: 11px;
}

.landing-close {
  top: 12px;
  right: 12px;
  width: 30px;
  height: 30px;
}
@keyframes l-pop {
  from { opacity: 0; transform: scale(0.6); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes l-fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: none; }
}

.landing-eyebrow {
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--blm-green-deep);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--line-soft);
  border-radius: var(--r-pill);
  animation: l-fade 600ms var(--ease) 100ms backwards;
}

.landing-title {
  font-family: var(--serif);
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-wrap: balance;
  animation: l-fade 600ms var(--ease) 160ms backwards;
}

.landing-sub {
  color: var(--ink-2);
  animation: l-fade 600ms var(--ease) 220ms backwards;
}

.landing-prompt {
  background: var(--surface);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  text-align: left;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: all 200ms var(--ease);
  animation: l-fade 500ms var(--ease) backwards;
}
.landing-prompt:hover {
  border-color: var(--blm-green);
  background: #FFF;
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(20, 112, 61, 0.1);
}
.landing-prompt:active { transform: translateY(0); }

.landing-prompt-icon {
  display: grid;
  place-items: center;
  background: var(--blm-green-soft);
  border-radius: var(--r-sm);
  flex-shrink: 0;
}
.landing-prompt-label { flex: 1; line-height: 1.35; }
.landing-prompt-arrow {
  color: var(--ink-3);
  flex-shrink: 0;
  transition: transform 160ms var(--ease), color 160ms var(--ease);
}
.landing-prompt:hover .landing-prompt-arrow {
  color: var(--blm-green-deep);
  transform: translateX(2px);
}

.landing-composer {
  animation: l-fade 600ms var(--ease) 600ms backwards;
}
.landing-composer .composer-inner {
  background: #FFF;
  box-shadow: var(--shadow-1);
  border: 1.5px solid var(--line);
}
.landing-composer .composer-inner:focus-within {
  border-color: var(--blm-green);
  box-shadow: 0 0 0 4px rgba(31, 168, 90, 0.12), 0 8px 24px rgba(20, 112, 61, 0.1);
}

.landing-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 8px;
  color: var(--ink-3);
}
.landing-foot kbd {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-2);
}

@media (max-width: 880px) {
  .app-landing {
    height: 100vh;
    max-height: 100vh;
    border-radius: 0;
    max-width: 100%;
  }
  .landing { padding: 24px 16px; }
  .landing-title { font-size: 32px; }
  .landing-sub { font-size: 14px; margin-bottom: 24px; }
  .landing-prompts { grid-template-columns: 1fr; gap: 8px; }
  .landing-prompt { padding: 14px 16px; }
}
.canvas-scroll::-webkit-scrollbar,
.thread-scroll::-webkit-scrollbar { width: 8px; }
.canvas-scroll::-webkit-scrollbar-thumb,
.thread-scroll::-webkit-scrollbar-thumb {
  background: var(--line);
  border-radius: 4px;
}
.canvas-scroll::-webkit-scrollbar-thumb:hover,
.thread-scroll::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }
</style>
