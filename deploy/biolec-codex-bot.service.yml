services:
  biolec-codex-bot:
    build:
      context: ./biolec-codex-bot
    container_name: biolec-codex-bot
    restart: unless-stopped
    env_file:
      - ./biolec-codex-bot/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
    expose:
      - "8787"
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true
